name: Place Explorer

on:
  workflow_dispatch:
    inputs:
      location:
        description: "Destination EN ANGLAIS - ville+pays (ex : Lisbon, Portugal) ou pays seul (ex : Portugal). Le nom du pays en anglais est obligatoire."
        required: true
        default: "Lisbon, Portugal"
      vacation_month:
        description: "Mois (français OK). 1 mois : Août, 2026 / 2 mois : Juin-Juillet, 2026. Virgule avant l'année, évite les phrases longues."
        required: true
        default: "Août, 2026"
      receiver_emails:
        description: "Destinataires, séparés par des virgules (ex : a@mail.com, b@mail.com). Laisser vide = envoi à romtaug@gmail.com."
        required: false
        default: "romtaug@gmail.com"
      nb_days:
        description: "Plan multi-jours (Excel séparé) : nombre de jours, ex 4. Laisser 0 = pas de plan multi-jours. Ville obligatoire (ex : Vilnius, Lithuania)."
        required: false
        default: "0"

jobs:
  place-explorer:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 📦 Install dependencies
        run: pip install requests pandas openpyxl

      - name: 🚀 Run Place Explorer
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          LOCATION: ${{ inputs.location }}
          VACATION_MONTH: ${{ inputs.vacation_month }}
          RECEIVER_EMAILS: ${{ inputs.receiver_emails }}
          NB_DAYS: ${{ inputs.nb_days }}
        run: python place_explorer.py

      - name: 📤 Upload Excel as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: place-explorer-excel
          path: Content/*.xlsx
          if-no-files-found: warn
          retention-days: 30
